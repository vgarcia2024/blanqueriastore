<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Acceder — BlancoGestión</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../env-config.js" onerror="console.warn('env-config.js no encontrado.')"></script>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/index.html" class="inline-block">
        <span class="text-2xl font-bold text-black tracking-tight">BlancoGestión</span>
      </a>
      <p class="text-sm text-gray-500 mt-1">Blanquería</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-gray-200">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 py-3.5 text-sm font-bold text-black border-b-2 border-black transition-all">
          Iniciar sesión
        </button>
        <button id="tab-register" onclick="switchTab('register')"
          class="flex-1 py-3.5 text-sm font-bold text-gray-400 border-b-2 border-transparent transition-all">
          Registrarse
        </button>
      </div>

      <!-- Login Form -->
      <div id="form-login" class="p-6">
        <div class="flex flex-col gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Email</label>
            <input id="login-email" type="email" placeholder="tu@email.com"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black transition-colors"/>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Contraseña</label>
            <div class="relative">
              <input id="login-password" type="password" placeholder="••••••••"
                class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black transition-colors pr-10"/>
              <button type="button" onclick="togglePwd('login-password')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <span class="material-symbols-outlined text-lg">visibility</span>
              </button>
            </div>
          </div>
          <p id="login-error" class="text-red-500 text-xs hidden"></p>
          <button onclick="doLogin()"
            class="w-full bg-black text-white py-2.5 rounded-lg text-sm font-bold hover:opacity-80 active:scale-[0.98] transition-all">
            Entrar
          </button>
        </div>
      </div>

      <!-- Register Form -->
      <div id="form-register" class="p-6 hidden">
        <div class="flex flex-col gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Nombre</label>
            <input id="reg-nombre" type="text" placeholder="Tu nombre"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black transition-colors"/>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Email</label>
            <input id="reg-email" type="email" placeholder="tu@email.com"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black transition-colors"/>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Teléfono (opcional)</label>
            <input id="reg-telefono" type="tel" placeholder="11 1234-5678"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black transition-colors"/>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Contraseña</label>
            <div class="relative">
              <input id="reg-password" type="password" placeholder="Mínimo 6 caracteres"
                class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black transition-colors pr-10"/>
              <button type="button" onclick="togglePwd('reg-password')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <span class="material-symbols-outlined text-lg">visibility</span>
              </button>
            </div>
          </div>
          <p id="reg-error" class="text-red-500 text-xs hidden"></p>
          <p id="reg-success" class="text-green-600 text-xs hidden"></p>
          <button onclick="doRegister()"
            class="w-full bg-black text-white py-2.5 rounded-lg text-sm font-bold hover:opacity-80 active:scale-[0.98] transition-all">
            Crear cuenta
          </button>
        </div>
      </div>

    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      <a href="/index.html" class="hover:text-black transition-colors">← Volver a la tienda</a>
    </p>
  </div>

  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Si ya hay sesión, redirigir
    BG_AUTH.getSession().then(session => {
      if (!session) return;
      BG_AUTH.getProfile().then(profile => {
        if (profile?.role === 'admin') {
          window.location.href = '/pages/panel.html';
        } else {
          window.location.href = '/pages/mi-cuenta.html';
        }
      });
    });

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-register').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').className = `flex-1 py-3.5 text-sm font-bold transition-all ${isLogin ? 'text-black border-b-2 border-black' : 'text-gray-400 border-b-2 border-transparent'}`;
      document.getElementById('tab-register').className = `flex-1 py-3.5 text-sm font-bold transition-all ${!isLogin ? 'text-black border-b-2 border-black' : 'text-gray-400 border-b-2 border-transparent'}`;
    }

    function togglePwd(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');

      if (!email || !password) {
        errEl.textContent = 'Completá email y contraseña.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await BG_AUTH.login(email, password);
        const profile = await BG_AUTH.getProfile();
        if (profile?.role === 'admin') {
          window.location.href = '/pages/panel.html';
        } else {
          window.location.href = '/pages/mi-cuenta.html';
        }
      } catch (err) {
        errEl.textContent = 'Email o contraseña incorrectos.';
        errEl.classList.remove('hidden');
      }
    }

    async function doRegister() {
      const nombre = document.getElementById('reg-nombre').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const telefono = document.getElementById('reg-telefono').value.trim();
      const password = document.getElementById('reg-password').value;
      const errEl = document.getElementById('reg-error');
      const okEl = document.getElementById('reg-success');
      errEl.classList.add('hidden');
      okEl.classList.add('hidden');

      if (!nombre || !email || !password) {
        errEl.textContent = 'Completá nombre, email y contraseña.';
        errEl.classList.remove('hidden');
        return;
      }
      if (password.length < 6) {
        errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        const { data, error } = await BG.db.auth.signUp({
          email,
          password,
          options: { data: { nombre, role: 'user' } }
        });
        if (error) throw error;

        // Actualizar perfil con nombre y teléfono
        if (data.user) {
          await BG.db.from('profiles').upsert({
            id: data.user.id,
            email,
            nombre,
            telefono,
            role: 'user'
          });
        }

        okEl.textContent = '¡Cuenta creada! Revisá tu email para confirmar.';
        okEl.classList.remove('hidden');
      } catch (err) {
        errEl.textContent = err.message || 'Error al registrarse.';
        errEl.classList.remove('hidden');
      }
    }

    // Enter para submit
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const loginVisible = !document.getElementById('form-login').classList.contains('hidden');
      if (loginVisible) doLogin(); else doRegister();
    });
  </script>
</body>
</html>
